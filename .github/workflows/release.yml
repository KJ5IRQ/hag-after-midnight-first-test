name: build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "v$VERSION" = "$GITHUB_REF_NAME"
      - name: Build wheel and source archive
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel outside the checkout
        run: |
          python -m venv "$RUNNER_TEMP/verify"
          "$RUNNER_TEMP/verify/bin/python" -m pip install --no-deps dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/verify/bin/debtmark" --version
          "$RUNNER_TEMP/verify/bin/python" -c "from debtmark.core import scan"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debtmark-distributions
          path: dist/
          if-no-files-found: error
